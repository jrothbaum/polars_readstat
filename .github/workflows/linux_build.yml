name: Build Linux Wheels (manylinux_2_28)

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build wheels on Linux (manylinux_2_28)
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          rustup toolchain install 1.93.0
          rustup default 1.93.0
          rustup target add x86_64-unknown-linux-gnu
        shell: bash

      - name: Install Python build tools
        run: |
          /opt/python/cp39-cp39/bin/pip install --upgrade pip maturin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: wheel-manylinux_2_28-x86_64

      - name: Build wheels
        run: |
          source ~/.cargo/env
          /opt/python/cp39-cp39/bin/maturin build --release --strip --out dist \
            --interpreter /opt/python/cp39-cp39/bin/python \
            --target x86_64-unknown-linux-gnu \
            --compatibility manylinux_2_28 \
            --jobs 2
        env:
          RUST_BACKTRACE: full
          CARGO_BUILD_JOBS: 2
          CARGO_INCREMENTAL: 0
          RUSTFLAGS: -C debuginfo=0 -C codegen-units=1
        shell: bash

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-manylinux_2_28-x86_64
          path: dist
